name = "links-prestige"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2026-07-22"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[routes]]
pattern = "link.prestigefit.co.il"
custom_domain = true
